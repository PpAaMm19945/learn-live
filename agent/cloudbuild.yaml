# Learn Live Agent — Cloud Build → Cloud Run
# Usage:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_REGION=us-central1

substitutions:
  _SERVICE_NAME: learnlive-agent
  _REGION: us-central1

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}'
      - '.'

  # Step 2: Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--set-env-vars=NODE_ENV=production,WORKER_API_URL=https://learn-live.antmwes104-1.workers.dev'
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,AGENT_SERVICE_KEY=AGENT_SERVICE_KEY:latest'

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}'

timeout: '600s'
